repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: pester-tests
        name: Run Pester tests
        entry: powershell -Command "Invoke-Pester -Path tests/ -EnableExit"
        language: system
        types: [powershell]
        pass_filenames: false
        always_run: true
ci:
  autofix_commit_msg: |
    [pre-commit.ci] style: apply pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] build: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
